<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Christopher Jiang</title>
    <link rel="stylesheet" href="css/education.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Contact</h1>
            <img src="images/contact image.webp" alt="Contact" class="profile-image">
            <p>Email: christjiang1492@gmail.com</p>
            <p>Phone: +1 (289) 885-6125</p>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Copyright © 2023 Christopher Jiang. All rights reserved.</p>
    </footer>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("M7I2nvX6lUiwTL1WM"); // Replace 'your-user-id' with your actual EmailJS user ID
        })();
    </script>
    <script type="text/javascript">
        window.onload = function() {
            document.getElementById('contact-form').addEventListener('submit', function(event) {
                event.preventDefault();
                emailjs.sendForm('service_ec21tt8', 'template_vec6nrj', this)
                    .then(function() {
                        alert('Message sent successfully!');
                        window.location.reload(); // Refresh the page to clear the form
                    }, function(error) {
                        alert('Failed to send the message, please try again.');
                    });
            });
        };
    </script>
</body>
</html>
